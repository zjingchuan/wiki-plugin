name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node --test dist/lib/__tests__/wiki-config.test.js dist/lib/__tests__/emf-converter.test.js dist/lib/md-to-docx/__tests__/preprocess.test.js dist/lib/md-to-docx/__tests__/parser.test.js dist/mcp/tools/__tests__/mark-processed.test.js dist/mcp/tools/__tests__/reconvert-images.test.js
      - run: npm pack

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - run: zip -r wiki-plugin-${GITHUB_REF_NAME#v}.zip .claude-plugin dist skills README.md package.json -x "*.map"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wiki-plugin-*.tgz
            wiki-plugin-*.zip
